<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="50%" style="stop-color:#2b6cb0"/>
      <stop offset="100%" style="stop-color:#2b6cb0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- SBA 文字 -->
  <text x="256" y="300" text-anchor="middle" fill="#fff"
    font-size="180" font-family="-apple-system,Helvetica,Arial,sans-serif" font-weight="800" letter-spacing="8">SBA</text>
  <!-- 三条横线代表数据波形 -->
  <line x1="100" y1="370" x2="200" y2="370" stroke="#63b3ed" stroke-width="8" stroke-linecap="round"/>
  <line x1="140" y1="395" x2="300" y2="395" stroke="#90cdf4" stroke-width="6" stroke-linecap="round"/>
  <line x1="120" y1="420" x2="260" y2="420" stroke="#bee3f8" stroke-width="4" stroke-linecap="round"/>
</svg>
